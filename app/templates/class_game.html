{% extends "base.html" %}

{% block content %}
<div class="classgame-container">
    <div class="classgame-header">
        <a href="{{ url_for('main.index') }}" class="btn btn-secondary btn-sm">← Back</a>
        <div>
            <p class="classgame-kicker">ClassGame</p>
            <h1>게임 선택</h1>
        </div>
    </div>

    <div class="game-library" aria-label="ClassGame library">
        {% for game in games %}
        <button
            type="button"
            class="game-card"
            data-game-name="{{ game.name }}"
            data-play-url="{{ game.play_url }}"
            {% if not game.available %}disabled{% endif %}>
            <span class="game-tag">{{ game.subtitle }}</span>
            <span class="game-title">{{ game.name }}</span>
            <span class="game-description">{{ game.description }}</span>
            <span class="game-action">{{ '전체화면으로 시작' if game.available else '게임 파일 없음' }}</span>
        </button>
        {% endfor %}
    </div>
</div>

<div class="game-stage" id="game-stage" aria-hidden="true">
    <div class="game-stage-toolbar">
        <button type="button" class="stage-btn" id="exit-game">나가기</button>
        <div class="stage-title" id="active-game-title">ClassGame</div>
        <button type="button" class="stage-btn" id="fullscreen-game">전체화면</button>
    </div>
    <iframe id="game-frame" class="game-frame" title="ClassGame player" allow="fullscreen; autoplay"></iframe>
</div>

<style>
.classgame-container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 10px 0 40px;
}

.classgame-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 28px;
}

.classgame-kicker {
    color: #b45309;
    font-weight: 800;
    letter-spacing: 0;
    margin-bottom: 4px;
}

.classgame-header h1 {
    margin: 0;
    font-size: 2rem;
    color: #111827;
}

.game-library {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 18px;
}

.game-card {
    min-height: 220px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    background:
        linear-gradient(150deg, rgba(17, 24, 39, 0.92), rgba(69, 10, 10, 0.9)),
        #111827;
    color: white;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-end;
    gap: 10px;
    overflow: hidden;
    padding: 24px;
    position: relative;
    text-align: left;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
}

.game-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        linear-gradient(90deg, rgba(245, 158, 11, 0.18), transparent 42%),
        repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.045) 0 1px, transparent 1px 12px);
    pointer-events: none;
}

.game-card:hover,
.game-card:focus-visible {
    border-color: #f59e0b;
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.2);
    outline: none;
    transform: translateY(-4px);
}

.game-card:disabled {
    cursor: not-allowed;
    filter: grayscale(1);
    opacity: 0.55;
    transform: none;
}

.game-tag,
.game-title,
.game-description,
.game-action {
    position: relative;
    z-index: 1;
}

.game-tag {
    color: #fbbf24;
    font-size: 0.8rem;
    font-weight: 800;
    text-transform: uppercase;
}

.game-title {
    font-size: 2rem;
    font-weight: 800;
    line-height: 1;
}

.game-description {
    color: #e5e7eb;
    line-height: 1.5;
    max-width: 420px;
}

.game-action {
    background: rgba(251, 191, 36, 0.14);
    border: 1px solid rgba(251, 191, 36, 0.42);
    border-radius: 8px;
    color: #fde68a;
    font-weight: 700;
    margin-top: 6px;
    padding: 9px 14px;
}

.game-stage {
    background: #030712;
    display: none;
    inset: 0;
    position: fixed;
    z-index: 1000;
}

.game-stage.active {
    display: block;
}

.game-frame {
    background: #050505;
    border: 0;
    display: block;
    height: 100vh;
    width: 100vw;
}

.game-stage-toolbar {
    align-items: center;
    display: flex;
    gap: 12px;
    justify-content: space-between;
    left: 12px;
    opacity: 0.32;
    pointer-events: none;
    position: absolute;
    right: 12px;
    top: 12px;
    transition: opacity 0.2s ease;
    z-index: 2;
}

.game-stage-toolbar:hover,
.game-stage-toolbar:focus-within {
    opacity: 1;
}

.stage-title {
    background: rgba(3, 7, 18, 0.7);
    border: 1px solid rgba(148, 163, 184, 0.28);
    border-radius: 8px;
    color: #f8fafc;
    font-weight: 700;
    max-width: 44vw;
    overflow: hidden;
    padding: 8px 14px;
    pointer-events: none;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.stage-btn {
    background: rgba(15, 23, 42, 0.78);
    border: 1px solid rgba(148, 163, 184, 0.35);
    border-radius: 8px;
    color: #f8fafc;
    cursor: pointer;
    font-weight: 700;
    min-height: 38px;
    padding: 0 14px;
    pointer-events: auto;
}

.stage-btn:hover,
.stage-btn:focus-visible {
    background: rgba(30, 41, 59, 0.92);
    outline: none;
}

body.classgame-playing {
    overflow: hidden;
}

@media (max-width: 640px) {
    .classgame-header {
        align-items: flex-start;
        flex-direction: column;
    }

    .game-card {
        min-height: 200px;
    }

    .stage-title {
        display: none;
    }
}
</style>

<script>
(function () {
    const stage = document.getElementById('game-stage');
    const frame = document.getElementById('game-frame');
    const title = document.getElementById('active-game-title');
    const exitButton = document.getElementById('exit-game');
    const fullscreenButton = document.getElementById('fullscreen-game');

    function requestStageFullscreen() {
        const request = stage.requestFullscreen || stage.webkitRequestFullscreen;
        if (!request) return;
        try {
            const result = request.call(stage);
            if (result && typeof result.catch === 'function') {
                result.catch(function () {});
            }
        } catch (error) {}
    }

    function focusGameFrame() {
        try {
            frame.focus();
            if (frame.contentWindow) frame.contentWindow.focus();
        } catch (error) {}
    }

    function openGame(button) {
        const playUrl = button.dataset.playUrl;
        const gameName = button.dataset.gameName || 'ClassGame';
        title.textContent = gameName;
        stage.classList.add('active');
        stage.setAttribute('aria-hidden', 'false');
        document.body.classList.add('classgame-playing');
        requestStageFullscreen();
        frame.src = playUrl;
        window.setTimeout(focusGameFrame, 250);
    }

    function closeGame() {
        frame.src = 'about:blank';
        stage.classList.remove('active');
        stage.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('classgame-playing');
        if (document.fullscreenElement && document.exitFullscreen) {
            const result = document.exitFullscreen();
            if (result && typeof result.catch === 'function') {
                result.catch(function () {});
            }
        }
    }

    document.querySelectorAll('.game-card:not(:disabled)').forEach(function (button) {
        button.addEventListener('click', function () {
            openGame(button);
        });
    });

    frame.addEventListener('load', focusGameFrame);
    exitButton.addEventListener('click', closeGame);
    fullscreenButton.addEventListener('click', function () {
        requestStageFullscreen();
        focusGameFrame();
    });
})();
</script>
{% endblock %}
