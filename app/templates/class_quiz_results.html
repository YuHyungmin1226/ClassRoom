{% extends "base.html" %}

{% block head %}
<style>
    .results-container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 20px;
    }

    .class-header {
        margin-bottom: 30px;
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .session-accordion {
        margin-bottom: 15px;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #e2e8f0;
    }

    .accordion-header {
        background: #f8fafc;
        padding: 15px 20px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: background 0.2s;
    }

    .accordion-header:hover {
        background: #f1f5f9;
    }

    .accordion-content {
        padding: 20px;
        background: white;
        display: none;
    }

    .accordion-content.active {
        display: block;
    }

    .stat-badge {
        font-size: 0.8rem;
        padding: 4px 10px;
        background: #e0e7ff;
        color: #4338ca;
        border-radius: 20px;
        font-weight: 600;
    }

    .correct-rate { color: #6366f1; font-weight: 800; }

    /* renderSessionResults()가 생성하는 표/진행바 마크업용 스타일.
       quiz_session.html에 동일한 이름의 .progress-bar/.progress-bar-container가 있으나
       margin-bottom 등 세부 값은 이 페이지 레이아웃에 맞게 다르게 조정되어 있다(완전 동일하지 않음).
       .loading-state는 이 페이지 전용 스타일로 quiz_session.html에는 대응 클래스가 없다. */
    .loading-state {
        padding: 20px;
        text-align: center;
        color: #64748b;
    }

    .progress-bar-container {
        width: 100%;
        height: 10px;
        background: #e2e8f0;
        border-radius: 5px;
        overflow: hidden;
    }

    .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #6366f1, #a855f7);
        width: 0%;
        transition: width 0.5s ease;
    }

    .admin-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
    }

    .admin-table th, .admin-table td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #f1f5f9;
    }

    .admin-table th {
        font-weight: 700;
        color: #475569;
        font-size: 0.85rem;
        text-transform: uppercase;
    }
</style>
{% endblock %}

{% block content %}
<div class="results-container">
    <div class="class-header">
        <div>
            <h1 style="margin:0;">{{ class_group.name }} - Integrated Results</h1>
            <p style="color: #64748b; margin: 5px 0 0 0;">Overview of all quiz sessions</p>
        </div>
        <a href="{{ url_for('main.admin_class', class_id=class_group.id) }}" class="btn btn-secondary">← Back to Class</a>
    </div>

    <div id="sessions-list">
        {% for session in sessions %}
        <div class="session-accordion">
            <div class="accordion-header" onclick="toggleAccordion('session-{{ session.id }}')">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span style="font-weight: 800; color: #1e293b;">{{ session.name }}</span>
                    <span class="stat-badge" id="count-{{ session.id }}">Loading...</span>
                </div>
                <div style="color: #64748b;">
                    <span id="rate-{{ session.id }}">-%</span>
                    <span style="margin-left: 10px;">▼</span>
                </div>
            </div>
            <div id="session-{{ session.id }}" class="accordion-content">
                <div class="loading-state">Loading results from server...</div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.1/socket.io.js"></script>
<script id="session-ids-data" type="application/json">
    {{ sessions|map(attribute='id')|list|tojson|safe }}
</script>
<script>
    const socket = io();
    const sessionIds = JSON.parse(document.getElementById('session-ids-data').textContent);
    const sessionData = {};

    // XSS 방지: 학생이 입력한 author_name 등을 innerHTML에 넣기 전 이스케이프
    function escapeHTML(str) {
        if (str === null || str === undefined) return '';
        return str.toString()
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function toggleAccordion(id) {
        const content = document.getElementById(id);
        const isActive = content.classList.contains('active');
        
        // Close others? Optional.
        
        if (isActive) {
            content.classList.remove('active');
        } else {
            content.classList.add('active');
            const sid = id.replace('session-', '');
            if (!sessionData[sid]) {
                fetchResults(sid);
            }
        }
    }

    function fetchResults(sessionId) {
        socket.emit('get_admin_results', { session_id: sessionId });
    }

    socket.on('admin_results_data', (data) => {
        const sid = data.session_id;
        const responses = data.responses;
        const questions = data.questions;
        sessionData[sid] = { responses, questions };

        renderSessionResults(sid);
    });

    function renderSessionResults(sid) {
        const content = document.getElementById(`session-${sid}`);
        const { responses, questions } = sessionData[sid];
        
        if (responses.length === 0) {
            content.innerHTML = '<p style="color: #64748b; text-align: center;">No submissions yet.</p>';
            document.getElementById(`count-${sid}`).innerText = "0 Participants";
            return;
        }

        // Group by participant
        const grouped = {};
        responses.forEach(r => {
            if (!grouped[r.client_id]) grouped[r.client_id] = { name: r.author_name, list: [] };
            grouped[r.client_id].list.push(r);
        });

        const studentCount = Object.keys(grouped).length;
        document.getElementById(`count-${sid}`).innerText = `${studentCount} Participants`;

        // Calculate average rate
        const scored = responses.filter(r => r.is_correct !== null);
        if (scored.length > 0) {
            const correct = scored.filter(r => r.is_correct).length;
            const rate = Math.round((correct / scored.length) * 100);
            document.getElementById(`rate-${sid}`).innerText = `${rate}% Avg.`;
        }

        let html = `
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Participant</th>
                        <th>Progress</th>
                        <th>Score</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody>
        `;

        for (let cid in grouped) {
            const user = grouped[cid];
            const correct = user.list.filter(r => r.is_correct).length;
            const total = user.list.length;
            const rate = total > 0 ? Math.round((correct / total) * 100) : 0;

            html += `
                <tr>
                    <td><strong>${escapeHTML(user.name)}</strong></td>
                    <td style="width: 200px;">
                        <div class="progress-bar-container" style="height: 8px;">
                            <div class="progress-bar" style="width: ${rate}%"></div>
                        </div>
                    </td>
                    <td><span class="correct-rate">${correct}</span> / ${total}</td>
                    <td>
                        <div style="font-size: 0.8rem; color: #64748b;">
                            ${user.list.map(r => r.is_correct ? '✅' : '❌').join(' ')}
                        </div>
                    </td>
                </tr>
            `;
        }

        html += '</tbody></table>';
        content.innerHTML = html;
    }

    // Auto-fetch small summary for all sessions on load
    window.onload = () => {
        sessionIds.forEach(sid => fetchResults(sid));
    };
</script>
{% endblock %}
